<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self-Hosting Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:   #0d1117;
      --bg:    #0d1117;
      --panel: #161b22;
      --edge:  #30363d;
      --green: #3fb950;
      --blue:  #58a6ff;
      --purple:#bc8cff;
      --gold:  #e3b341;
      --muted: #8b949e;
      --text:  #c9d1d9;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Source Serif 4', Georgia, serif;
      min-height: 100vh;
      padding: 3rem 1.5rem 6rem;
    }

    /* ── HEADER ── */
    .page-header {
      max-width: 720px;
      margin: 0 auto 3rem;
      border-bottom: 1px solid var(--edge);
      padding-bottom: 1.75rem;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 0.6rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5.5vw, 3.2rem);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .subtitle {
      margin-top: 0.8rem;
      font-size: 0.975rem;
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── SECTION LABELS ── */
    .section-label {
      max-width: 720px;
      margin: 2.5rem auto 0;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .section-label span { color: var(--purple); }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--edge);
    }

    /* ── STEPS ── */
    .steps {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    .step {
      display: grid;
      grid-template-columns: 3rem 1fr;
      gap: 0 1.25rem;
      padding: 1.75rem 0;
      border-bottom: 1px solid var(--edge);
      opacity: 0;
      transform: translateY(14px);
      animation: rise 0.45s ease forwards;
    }
    .step:last-child { border-bottom: none; }

    .step-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--gold);
      text-align: right;
      padding-top: 0.3rem;
      letter-spacing: 0.05em;
      user-select: none;
    }

    .step-body { padding-top: 0.1rem; }

    .step-heading {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    .step-text {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text);
      font-weight: 300;
    }

    /* ── CODE BLOCK ── */
    .code-block {
      margin-top: 0.85rem;
      background: #010409;
      border: 1px solid var(--edge);
      border-radius: 6px;
      padding: 0.85rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--green);
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre;
      position: relative;
    }

    .code-block .comment { color: var(--muted); }
    .code-block .kw      { color: var(--blue); }
    .code-block .str     { color: var(--gold); }

    .copy-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: var(--edge);
      border: none;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .copy-btn:hover { background: var(--blue); color: #fff; }

    /* ── NOTE ── */
    .step-note {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.8rem;
      background: rgba(88,166,255,0.08);
      border-left: 3px solid var(--blue);
      padding: 0.5rem 0.75rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--blue);
      border-radius: 0 4px 4px 0;
      line-height: 1.55;
    }

    .step-note.warn {
      background: rgba(227,179,65,0.08);
      border-color: var(--gold);
      color: var(--gold);
    }

    /* ── ANIMATION ── */
    @keyframes rise { to { opacity: 1; transform: translateY(0); } }

    /* ── DISCLAIMER ── */
    .disclaimer {
      max-width: 720px;
      margin: 0 auto 2.5rem;
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      background: rgba(227,179,65,0.07);
      border: 1px solid var(--gold);
      border-radius: 6px;
      padding: 0.9rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.74rem;
      color: var(--gold);
      line-height: 1.65;
    }
    .disclaimer-icon { font-size: 1rem; flex-shrink: 0; margin-top: 0.05rem; }

    /* ── FOOTER ── */
    .page-footer {
      max-width: 720px;
      margin: 3rem auto 0;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--edge);
    }
  </style>
</head>
<body>

/* ════════════════════════════════════════════════════════════════
   RENDERER — no need to edit below this line
   ════════════════════════════════════════════════════════════════ */

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyCode(btn) {
  const pre = btn.parentElement;
  const text = pre.innerText.replace('COPY','').trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'COPIED';
    setTimeout(() => btn.textContent = 'COPY', 1500);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  // Header
  const hdr = document.createElement('header');
  hdr.className = 'page-header';
  hdr.innerHTML = `
    <div class="eyebrow">${GUIDE.eyebrow}</div>
    <h1>${GUIDE.title}</h1>
    ${GUIDE.subtitle ? `<p class="subtitle">${GUIDE.subtitle}</p>` : ''}
  `;
  document.body.appendChild(hdr);

  // Disclaimer
  if (GUIDE.disclaimer) {
    const disc = document.createElement('div');
    disc.className = 'disclaimer';
    disc.innerHTML = `<span class="disclaimer-icon">⚠️</span><span>${GUIDE.disclaimer}</span>`;
    document.body.appendChild(disc);
  }

  let delay = 0;

  GUIDE.sections.forEach(section => {
    // Section label
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.innerHTML = `<span>${section.label}</span>`;
    document.body.appendChild(lbl);

    // Steps container
    const stepsEl = document.createElement('div');
    stepsEl.className = 'steps';

    section.steps.forEach((step, i) => {
      const el = document.createElement('div');
      el.className = 'step';
      el.style.animationDelay = `${delay}s`;
      delay += 0.08;

      let inner = `
        <div class="step-num">${String(i + 1).padStart(2,'0')}</div>
        <div class="step-body">
          <div class="step-heading">${step.heading}</div>
          <div class="step-text">${step.text}</div>
      `;

      if (step.code) {
        inner += `<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">COPY</button>${escapeHtml(step.code)}</div>`;
      }

      if (step.note) {
        inner += `<div class="step-note ${step.note.type === 'warn' ? 'warn' : ''}">ℹ ${step.note.text}</div>`;
      }

      inner += `</div>`;
      el.innerHTML = inner;
      stepsEl.appendChild(el);
    });

    document.body.appendChild(stepsEl);
  });

  // Footer
  const footer = document.createElement('footer');
  footer.className = 'page-footer';
  const total = GUIDE.sections.reduce((acc, s) => acc + s.steps.length, 0);
  footer.textContent = `${total} steps across ${GUIDE.sections.length} sections`;
  document.body.appendChild(footer);
});
</script>
</body>
</html>
